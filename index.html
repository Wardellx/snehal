<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&family=DM+Sans&display=swap" rel="stylesheet">

<style>
:root {
  --blush:#f2c4c4; --rose:#e8a0a0; --cream:#fdf6f0;
  --warm:#f7ede2; --text:#3a2f2f; --muted:#8a7070;
}
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream); color:var(--text);
}

nav{
  position:fixed; top:0; width:100%;
  display:flex; justify-content:center;
  background:rgba(253,246,240,0.9);
  padding:12px; z-index:100;
}
nav button{
  border:none; background:none;
  padding:8px 20px; cursor:pointer;
  border-radius:20px;
}
nav button.active, nav button:hover{
  background:var(--blush);
}

.page{display:none; padding-top:60px;}
.page.active{display:block;}

.home-hero{text-align:center; padding:40px;}
.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
}
.hero-sub{color:var(--muted); margin-top:10px;}

.hero-photo-wrap{
  width:260px; margin:30px auto;
}
.hero-photo-wrap img{
  width:100%; border-radius:20px;
  object-fit:cover;
}

.home-mini-row{
  display:flex; gap:10px; justify-content:center;
}
.home-mini-row img{
  width:90px; height:140px;
  object-fit:cover; border-radius:12px;
}

/* gallery */
.gallery-header{text-align:center; padding:40px;}
.gallery-grid{
  display:grid; grid-template-columns:1fr 1fr;
  gap:10px; padding:15px;
}
.g-card img{
  width:100%; border-radius:15px;
  object-fit:cover;
}
.g-card.full{grid-column:span 2;}

.lightbox{
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center; align-items:center;
}
.lightbox.open{display:flex;}
.lightbox img{
  max-width:90%; max-height:90%;
}
</style>

</head>

<body>

<nav>
  <button class="active" onclick="showPage('home',this)">Home</button>
  <button onclick="showPage('gallery',this)">Gallery</button>
</nav>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<!-- HOME -->

<div id="home" class="page active">

<div class="home-hero">
  <h1 class="hero-title">Hey, you're special ✨</h1>
  <p class="hero-sub">Just something made for you 💖</p>
</div>

<div class="hero-photo-wrap">
  <img src="images/photo1.jpg">
</div>

<div class="home-mini-row">
  <img src="images/photo2.jpg">
  <img src="images/photo3.jpg">
  <img src="images/photo4.jpg">
</div>

</div>

<!-- GALLERY -->

<div id="gallery" class="page">

<div class="gallery-header">
  <h2>Gallery 💫</h2>
</div>

<div class="gallery-grid">

  <div class="g-card" onclick="openLightbox('images/photo1.jpg')">
    <img src="images/photo1.jpg">
  </div>

  <div class="g-card" onclick="openLightbox('images/photo2.jpg')">
    <img src="images/photo2.jpg">
  </div>

  <div class="g-card" onclick="openLightbox('images/photo3.jpg')">
    <img src="images/photo3.jpg">
  </div>

  <div class="g-card" onclick="openLightbox('images/photo4.jpg')">
    <img src="images/photo4.jpg">
  </div>

  <div class="g-card full" onclick="openLightbox('images/photo5.jpg')">
    <img src="images/photo5.jpg">
  </div>

</div>

</div>

<script>
function showPage(page,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(page).classList.add('active');

  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function openLightbox(src){
  document.getElementById('lightbox-img').src=src;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}
</script>

</body>
</html>
